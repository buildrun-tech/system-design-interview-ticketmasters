# Application identity (sets OTel service.name resource attribute)
quarkus.application.name=ticketmaster

# OpenTelemetry SDK — traces disabled (non-goal); metrics handled by Micrometer OTLP below
quarkus.otel.metrics.exporter=none
quarkus.otel.traces.exporter=none

# Micrometer OTLP registry — bridges Micrometer binders (HTTP, JVM, DB pool) to ADOT Collector
# Uses Micrometer's own HTTP sender, no OTel SDK HttpSenderProvider required
quarkus.micrometer.export.otlp.url=${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318}/v1/metrics
quarkus.micrometer.export.otlp.step=PT1M
# Resource attributes propagated to CloudWatch EMF dimensions via resource_to_telemetry_conversion
quarkus.micrometer.export.otlp.resource-attributes=service.name=ticketmaster,deployment.environment=${QUARKUS_PROFILE:local}

# Micrometer auto-instrumentation
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.jvm=true

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=ticketmaster
quarkus.datasource.password=ticketmaster
quarkus.datasource.jdbc.min-size=${JDBC_MIN_CONNECTIONS:2}
quarkus.datasource.jdbc.max-size=${JDBC_MAX_CONNECTIONS:20}
quarkus.hibernate-orm.schema-management.strategy=update

# Import.sql - TODO revisar
#quarkus.hibernate-orm.sql-load-script=import.sql
#quarkus.hibernate-orm.log.sql=true


# AWS SQS CONSUMER - SMALL RYE
mp.messaging.incoming.check-booking.connector=smallrye-sqs
mp.messaging.incoming.check-booking.queue.url=${SQS_CHECK_BOOKING_PENDING_STATE_QUEUE_URL:}

booking.expiration.check.seconds=30

# JWT CONFIG
mp.jwt.verify.issuer=ticketmaster

# Public/private key PEM content is injected as env vars by ECS from AWS Secrets
# Manager (dev/prod) — never present in the classpath/image. Local dev overrides
# these with file-based sample keys; see application-local.properties and the
# README section "Running locally".
%dev.mp.jwt.verify.publickey=${MP_JWT_VERIFY_PUBLICKEY}
%dev.smallrye.jwt.sign.key=${SMALLRYE_JWT_SIGN_KEY}
%prod.mp.jwt.verify.publickey=${MP_JWT_VERIFY_PUBLICKEY}
%prod.smallrye.jwt.sign.key=${SMALLRYE_JWT_SIGN_KEY}

# JWT Public endpoints
quarkus.http.auth.permission.public.paths=/auth/*,/users,/setup-admin,/q/health/*
quarkus.http.auth.permission.public.policy=permit

# JWT Private endpoints
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated
