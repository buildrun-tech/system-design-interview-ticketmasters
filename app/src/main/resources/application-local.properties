# Datasource
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ticketmasterdb

# SQS
quarkus.sqs.endpoint-override=http://localhost:4566
quarkus.sqs.aws.region=sa-east-1
quarkus.sqs.aws.credentials.type=static
quarkus.sqs.aws.credentials.static-provider.access-key-id=test-key
quarkus.sqs.aws.credentials.static-provider.secret-access-key=test-secret

mp.messaging.incoming.check-booking.queue.url=http://sqs.sa-east-1.localhost.localstack.cloud:4566/000000000000/check-booking-pending-state

quarkus.datasource.devservices.enabled=false
quarkus.sqs.devservices.enabled=false

# JWT — sample RSA keys for local dev only, never packaged into the image.
# Path is relative to the `app/` working directory (where ./mvnw runs from).
mp.jwt.verify.publickey.location=file:./local-keys/publicKey.pem
smallrye.jwt.sign.key.location=file:./local-keys/rsaPrivateKey.pem