name: CI/CD Pipeline

on:
  push:
    branches:
      - develop    # DEV environment
      - main       # PROD environment

env:
  # Environment detection based on branch
  ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
  AWS_REGION: us-east-2
  
  # Configuration flags (can be overridden via repository variables)
  TERRAFORM_ACTION: ${{ vars.TERRAFORM_ACTION || 'apply' }}  # apply or destroy
  DESTROY_INFRASTRUCTURE: ${{ vars.DESTROY_INFRASTRUCTURE || 'false' }}

# Required permissions for OIDC token
permissions:
  id-token: write   # Required for OIDC authentication with AWS
  contents: read    # Required to checkout repository
  actions: read     # Required for workflow execution
  security-events: write  # Required for security scanning

jobs:
  # Environment setup and validation
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env-setup.outputs.environment }}
      aws-role-arn: ${{ steps.env-setup.outputs.aws-role-arn }}
      should-build: ${{ steps.env-setup.outputs.should-build }}
      should-promote: ${{ steps.env-setup.outputs.should-promote }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Environment Setup and Validation
        id: env-setup
        run: |
          echo "Setting up environment for: ${{ env.ENVIRONMENT }}"
          
          # Environment-specific configuration
          if [ "${{ env.ENVIRONMENT }}" = "prod" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "aws-role-arn=${{ secrets.AWS_ROLE_ARN_PROD }}" >> $GITHUB_OUTPUT
            echo "should-build=false" >> $GITHUB_OUTPUT
            echo "should-promote=true" >> $GITHUB_OUTPUT
            echo "🚀 PROD Environment - Image promotion workflow"
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "aws-role-arn=${{ secrets.AWS_ROLE_ARN_DEV }}" >> $GITHUB_OUTPUT
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "should-promote=false" >> $GITHUB_OUTPUT
            echo "🔧 DEV Environment - Full build workflow"
          fi
          
          # Validate required secrets
          if [ -z "${{ secrets.AWS_ROLE_ARN_DEV }}" ] && [ "${{ env.ENVIRONMENT }}" = "dev" ]; then
            echo "❌ Missing AWS_ROLE_ARN_DEV secret"
            exit 1
          fi
          
          if [ -z "${{ secrets.AWS_ROLE_ARN_PROD }}" ] && [ "${{ env.ENVIRONMENT }}" = "prod" ]; then
            echo "❌ Missing AWS_ROLE_ARN_PROD secret"
            exit 1
          fi
          
          # Configuration validation
          echo "Terraform Action: ${{ env.TERRAFORM_ACTION }}"
          echo "Destroy Infrastructure: ${{ env.DESTROY_INFRASTRUCTURE }}"
          
          # Validate Terraform action
          if [ "${{ env.TERRAFORM_ACTION }}" != "apply" ] && [ "${{ env.TERRAFORM_ACTION }}" != "destroy" ]; then
            echo "❌ Invalid TERRAFORM_ACTION: ${{ env.TERRAFORM_ACTION }}"
            echo "Valid values: apply, destroy"
            exit 1
          fi
          
          # Validate destroy infrastructure flag
          if [ "${{ env.DESTROY_INFRASTRUCTURE }}" != "true" ] && [ "${{ env.DESTROY_INFRASTRUCTURE }}" != "false" ]; then
            echo "❌ Invalid DESTROY_INFRASTRUCTURE: ${{ env.DESTROY_INFRASTRUCTURE }}"
            echo "Valid values: true, false"
            exit 1
          fi
          
          # PROD environment protection
          if [ "${{ env.ENVIRONMENT }}" = "prod" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "❌ PROD deployments not allowed from pull requests"
              exit 1
            fi
            
            if [ "${{ github.ref }}" != "refs/heads/main" ]; then
              echo "❌ PROD deployments only allowed from main branch"
              exit 1
            fi
            
            # Additional safety check for PROD destroy
            if [ "${{ env.DESTROY_INFRASTRUCTURE }}" = "true" ]; then
              echo "⚠️ PRODUCTION INFRASTRUCTURE DESTROY REQUESTED"
              echo "This is a destructive operation that will remove all production resources!"
              echo "Ensure this is intentional and you have proper backups."
              echo "Proceeding with PROD destroy operation..."
            fi
            
            echo "✅ PROD environment protection checks passed"
          fi
          
          # Early validation for required Terraform files
          if [ ! -f "terraform/envs/${{ env.ENVIRONMENT }}/terraform.tfvars" ]; then
            echo "❌ Missing Terraform variables file: terraform/envs/${{ env.ENVIRONMENT }}/terraform.tfvars"
            exit 1
          fi
          
          if [ ! -f "terraform/backend-config/${{ env.ENVIRONMENT }}.hcl" ]; then
            echo "❌ Missing Terraform backend config: terraform/backend-config/${{ env.ENVIRONMENT }}.hcl"
            exit 1
          fi
          
          echo "✅ Configuration validation completed successfully"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: GitHubActions-Setup
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS CLI setup
        run: |
          echo "🔧 Verifying AWS CLI setup..."
          aws --version
          aws sts get-caller-identity
          echo "✅ AWS CLI configured successfully"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.1
          terraform_wrapper: false

      - name: Verify Terraform setup
        run: |
          echo "🔧 Verifying Terraform setup..."
          terraform version
          echo "✅ Terraform configured successfully"

      - name: Verify Maven setup
        working-directory: ./app
        run: |
          echo "🔧 Verifying Maven setup..."
          chmod +x ./mvnw
          ./mvnw --version
          echo "✅ Maven configured successfully with Java 21"

  # Build and test job (DEV environment only)
  build-and-test:
    name: Build and Test (DEV)
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should-build == 'true'
    outputs:
      jar-artifact: ${{ steps.build.outputs.jar-artifact }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore Maven dependencies
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Maven tests
        working-directory: ./app
        run: |
          echo "🧪 Running Maven tests..."
          chmod +x ./mvnw
          ./mvnw test --batch-mode --fail-at-end
          echo "✅ All tests passed"

      - name: Build application package
        id: build
        working-directory: ./app
        run: |
          echo "🔨 Building application package..."
          ./mvnw package -DskipTests --batch-mode
          
          # Find the generated JAR file
          JAR_FILE=$(find target -name "*.jar" | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ No JAR file found in target directory"
            exit 1
          fi
          
          echo "jar-artifact=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "✅ Build completed: $JAR_FILE"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: app/target/quarkus-app/
          retention-days: 1

  # Docker build job (DEV environment only)
  docker-build:
    name: Build Docker Image (DEV)
    runs-on: ubuntu-latest
    needs: [setup, build-and-test]
    if: needs.setup.outputs.should-build == 'true'
    permissions:
      id-token: write   # Required for OIDC authentication with AWS
      contents: read    # Required to checkout repository
    outputs:
      image-tag: ${{ steps.docker.outputs.image-tag }}
      image-digest: ${{ steps.docker.outputs.image-digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: app/target/quarkus-app/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: GitHubActions-DockerBuild
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: docker
        working-directory: ./app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_DEV || 'ticketmaster-dev' }}
          IMAGE_TAG: ${{ github.sha }}-dev
        run: |
          echo "🐳 Building Docker image..."
          
          echo "ECR_REGISTRY: $ECR_REGISTRY"
          echo "ECR_REPOSITORY: $ECR_REPOSITORY"
          echo "IMAGE_TAG: $IMAGE_TAG"
          
          # Build image using existing Dockerfile.jvm
          docker build -f src/main/docker/Dockerfile.jvm -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest-dev
          
          echo "📤 Pushing image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest-dev
          
          # Get image digest for immutable reference
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG | cut -d'@' -f2)
          
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image-digest=$IMAGE_DIGEST" >> $GITHUB_OUTPUT
          echo "✅ Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # Image promotion job (PROD environment only)
  image-promotion:
    name: Promote Image (PROD)
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should-promote == 'true'
    permissions:
      id-token: write   # Required for OIDC authentication with AWS
      contents: read    # Required to checkout repository
    outputs:
      promoted-image-tag: ${{ steps.promote.outputs.promoted-image-tag }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: GitHubActions-ImagePromotion
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote DEV image to PROD
        id: promote
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_DEV: ${{ vars.ECR_REPOSITORY_DEV || 'ticketmaster-dev' }}
          ECR_REPOSITORY_PROD: ${{ vars.ECR_REPOSITORY_PROD || 'ticketmaster-prod' }}
          DEV_IMAGE_TAG: ${{ github.sha }}-dev
          PROD_IMAGE_TAG: ${{ github.sha }}-prod
        run: |
          echo "🔄 Promoting DEV image to PROD..."
          
          # Verify DEV image exists
          if ! aws ecr describe-images --repository-name $ECR_REPOSITORY_DEV --image-ids imageTag=$DEV_IMAGE_TAG >/dev/null 2>&1; then
            echo "❌ DEV image not found: $ECR_REPOSITORY_DEV:$DEV_IMAGE_TAG"
            echo "Please ensure the corresponding DEV build has completed successfully."
            exit 1
          fi
          
          # Pull DEV image
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY_DEV:$DEV_IMAGE_TAG
          
          # Retag for PROD
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_DEV:$DEV_IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_PROD:$PROD_IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_DEV:$DEV_IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_PROD:latest-prod
          
          # Push PROD tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_PROD:$PROD_IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_PROD:latest-prod
          
          echo "promoted-image-tag=$PROD_IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Image promoted: $ECR_REGISTRY/$ECR_REPOSITORY_PROD:$PROD_IMAGE_TAG"
          echo "📋 Audit: Promoted $ECR_REPOSITORY_DEV:$DEV_IMAGE_TAG to $ECR_REPOSITORY_PROD:$PROD_IMAGE_TAG"

  # Infrastructure management
  infrastructure:
    name: Manage Infrastructure
    runs-on: ubuntu-latest
    needs: [setup, build-and-test, docker-build, image-promotion]
    if: |
      always() && !cancelled() &&
      needs.setup.result == 'success' &&
      (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped') &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped') &&
      (needs.image-promotion.result == 'success' || needs.image-promotion.result == 'skipped')
    outputs:
      infrastructure-status: ${{ steps.set-status.outputs.status }}
      ecs-cluster-name: ${{ steps.terraform-outputs.outputs.cluster-name }}
      ecs-service-name: ${{ steps.terraform-outputs.outputs.service-name }}
      ecs-task-definition-arn: ${{ steps.terraform-outputs.outputs.task-definition-arn }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: GitHubActions-Infrastructure
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.1
          terraform_wrapper: false

      - name: Read destroy configuration
        id: read-destroy-config
        run: |
          DESTROY="$(jq -r --arg env "$ENVIRONMENT" '.[$env]' ./terraform/destroy_config.json)"
          echo "destroy=$DESTROY" >> $GITHUB_OUTPUT

      - name: Determine deployment image tag
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: image-tag
        run: |
          if [ "$ENVIRONMENT" = "prod" ]; then
            IMAGE_TAG="${{ needs.image-promotion.outputs.promoted-image-tag }}"
            if [ -z "$IMAGE_TAG" ]; then
              echo "❌ No promoted image tag available for prod deployment"
              exit 1
            fi
          else
            IMAGE_TAG="${{ needs.docker-build.outputs.image-tag }}"
            if [ -z "$IMAGE_TAG" ]; then
              echo "❌ No build image tag available for dev deployment"
              exit 1
            fi
          fi
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Selected image tag: $IMAGE_TAG"

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="backend-config/${ENVIRONMENT}.hcl" \
            -reconfigure

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Destroy
        if: steps.read-destroy-config.outputs.destroy == 'true'
        id: terraform-destroy
        run: |
          cd terraform
          terraform workspace select $ENVIRONMENT || terraform workspace new $ENVIRONMENT
          terraform destroy -var-file="./envs/$ENVIRONMENT/terraform.tfvars" -auto-approve
          echo "status=destroyed" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-plan
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          cd terraform
          terraform workspace select $ENVIRONMENT || terraform workspace new $ENVIRONMENT
          terraform plan \
            -var-file="./envs/$ENVIRONMENT/terraform.tfvars" \
            -var="image_tag=$IMAGE_TAG" \
            -out="$ENVIRONMENT.plan"

      - name: Terraform Apply
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-apply
        run: |
          cd terraform
          terraform workspace select $ENVIRONMENT || terraform workspace new $ENVIRONMENT
          terraform apply "$ENVIRONMENT.plan"
          echo "status=applied" >> $GITHUB_OUTPUT

      - name: Capture Terraform outputs
        if: steps.terraform-apply.outputs.status == 'applied'
        id: terraform-outputs
        run: |
          cd terraform
          terraform workspace select $ENVIRONMENT || terraform workspace new $ENVIRONMENT
          echo "cluster-name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "service-name=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT
          echo "task-definition-arn=$(terraform output -raw ecs_task_definition_arn)" >> $GITHUB_OUTPUT

      - name: Set infrastructure status
        if: always()
        id: set-status
        run: |
          if [ "${{ steps.terraform-apply.outputs.status }}" = "applied" ]; then
            echo "status=applied" >> $GITHUB_OUTPUT
          elif [ "${{ steps.terraform-destroy.outputs.status }}" = "destroyed" ]; then
            echo "status=destroyed" >> $GITHUB_OUTPUT
          elif [ "${{ steps.terraform-apply.conclusion }}" = "failure" ]; then
            echo "status=apply-failed" >> $GITHUB_OUTPUT
          elif [ "${{ steps.terraform-destroy.conclusion }}" = "failure" ]; then
            echo "status=destroy-failed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

  # ECS rollout verification (Terraform apply is the deployment — this stage verifies the outcome)
  deploy:
    name: Verify ECS Rollout
    runs-on: ubuntu-latest
    needs: [setup, infrastructure]
    if: |
      always() && !cancelled() &&
      needs.setup.result == 'success' &&
      needs.infrastructure.result == 'success' &&
      needs.infrastructure.outputs.infrastructure-status == 'applied'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: GitHubActions-Verify
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify ECS rollout
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          ECS_CLUSTER: ${{ needs.infrastructure.outputs.ecs-cluster-name }}
          ECS_SERVICE: ${{ needs.infrastructure.outputs.ecs-service-name }}
          EXPECTED_TASK_DEF: ${{ needs.infrastructure.outputs.ecs-task-definition-arn }}
        run: |
          echo "🔍 Verifying Terraform-managed ECS rollout for $ENVIRONMENT"
          echo "Cluster:  $ECS_CLUSTER"
          echo "Service:  $ECS_SERVICE"
          echo "Expected task definition: $EXPECTED_TASK_DEF"

          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "Current task definition: $CURRENT_TASK_DEF"

          if [ "$CURRENT_TASK_DEF" = "$EXPECTED_TASK_DEF" ]; then
            echo "✅ ECS service is using the expected task definition — Terraform-managed rollout successful"
          else
            echo "❌ ECS rollout synchronization error"
            echo "Expected: $EXPECTED_TASK_DEF"
            echo "Current:  $CURRENT_TASK_DEF"
            exit 1
          fi

  # Final status report
  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [setup, build-and-test, docker-build, image-promotion, infrastructure, deploy]
    if: always()
    steps:
      - name: Report Pipeline Status
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          INFRA_STATUS: ${{ needs.infrastructure.outputs.infrastructure-status }}
        run: |
          echo "📊 Pipeline Execution Summary"
          echo "Environment: $ENVIRONMENT"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Terraform Action: ${{ env.TERRAFORM_ACTION }}"
          echo "Destroy Mode: ${{ env.DESTROY_INFRASTRUCTURE }}"

          if [ "$ENVIRONMENT" = "dev" ]; then
            echo ""
            echo "DEV Pipeline Status:"
            echo "- Setup: ${{ needs.setup.result }}"
            echo "- Build & Test: ${{ needs.build-and-test.result }}"
            echo "- Docker Build: ${{ needs.docker-build.result }}"
          else
            echo ""
            echo "PROD Pipeline Status:"
            echo "- Setup: ${{ needs.setup.result }}"
            echo "- Image Promotion: ${{ needs.image-promotion.result }}"
          fi

          echo "- Infrastructure: ${{ needs.infrastructure.result }} (Status: $INFRA_STATUS)"
          echo "- Verify ECS Rollout: ${{ needs.deploy.result }}"
          
          # Detailed infrastructure status
          echo ""
          echo "Infrastructure Details:"
          case "$INFRA_STATUS" in
            "applied")
              echo "✅ Infrastructure successfully provisioned/updated"
              ;;
            "destroyed")
              echo "✅ Infrastructure successfully destroyed"
              ;;
            "no-changes")
              echo "✅ Infrastructure up to date - no changes needed"
              ;;
            "apply-failed")
              echo "❌ Infrastructure provisioning failed"
              ;;
            "destroy-failed")
              echo "❌ Infrastructure destruction failed"
              ;;
            "failed")
              echo "❌ Infrastructure operation failed"
              ;;
            *)
              echo "❓ Unknown infrastructure status: $INFRA_STATUS"
              ;;
          esac
          
          # Check for any failures
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo ""
            echo "❌ Pipeline completed with failures"
            exit 1
          else
            echo ""
            echo "✅ Pipeline completed successfully"
          fi
